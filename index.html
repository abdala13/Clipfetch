<!DOCTYPE html>
<html class="dark" dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TempBox | Abdala hanouna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <style>
        body { font-family: 'Noto Sans Arabic', sans-serif; transition: all 0.3s ease; }
        .glass { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .light .glass { background: rgba(0, 0, 0, 0.02); border: 1px solid rgba(0, 0, 0, 0.05); }
        .light { background-color: #f8fafc; color: #1e293b; }
        .carousel-item { display: none; }
        .carousel-item.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

    <!-- Header -->
    <header class="border-b border-slate-800 p-4 mb-8 glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-symbols-rounded text-indigo-500 text-3xl">bolt</span>
                <h1 class="text-xl font-black tracking-tighter">TEMP<span class="text-indigo-500">BOX</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleLang()" class="p-2 hover:bg-slate-800 rounded-lg transition text-sm font-bold" id="langBtn">EN</button>
                <button onclick="toggleTheme()" class="p-2 hover:bg-slate-800 rounded-lg transition"><span class="material-symbols-rounded" id="themeIcon">light_mode</span></button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pb-20">
        <!-- Generator Card -->
        <div class="glass rounded-3xl p-8 text-center mb-8 shadow-2xl border-indigo-500/20">
            <h2 id="title" class="text-3xl font-black mb-2">بريدك المؤقت جاهز</h2>
            <p id="subtitle" class="text-slate-400 mb-8">استخدمه للتسجيل وتفعيل الحسابات بأمان</p>
            
            <div class="flex flex-col md:flex-row gap-3 items-stretch max-w-2xl mx-auto">
                <input id="emailInput" readonly type="text" value="جاري إنشاء البريد..." class="bg-slate-900/50 border-2 border-slate-700 rounded-2xl px-6 py-4 text-center font-mono text-lg flex-grow focus:border-indigo-500 outline-none">
                <button onclick="copyEmail()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-2xl font-bold transition flex items-center justify-center gap-2 active:scale-95">
                    <span class="material-symbols-rounded">content_copy</span> <span id="copyBtnText">نسخ</span>
                </button>
            </div>

            <div class="flex justify-center gap-4 mt-6">
                <button onclick="fetchMessages()" class="flex items-center gap-1 text-sm text-slate-400 hover:text-indigo-400"><span class="material-symbols-rounded text-sm">refresh</span> <span id="refreshText">تحديث يدوي</span></button>
                <button onclick="createNewEmail()" class="flex items-center gap-1 text-sm text-slate-400 hover:text-rose-400"><span class="material-symbols-rounded text-sm">delete</span> <span id="changeText">تغيير العنوان</span></button>
            </div>
            
            <p id="timerText" class="text-[10px] text-slate-500 mt-4 uppercase tracking-widest">يتم التحديث كل 5 ثوانٍ</p>
        </div>

        <!-- Inbox -->
        <div class="glass rounded-3xl overflow-hidden shadow-xl">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/20">
                <h3 class="font-bold flex items-center gap-2"><span class="material-symbols-rounded text-indigo-500">inbox</span> <span id="inboxTitle">صندوق الوارد</span></h3>
                <span id="msgCount" class="bg-indigo-500/20 text-indigo-400 text-xs px-3 py-1 rounded-full font-bold">0</span>
            </div>
            <div id="inboxContainer" class="divide-y divide-slate-800 min-h-[300px]">
                <div id="emptyState" class="p-20 text-center opacity-40">
                    <span class="material-symbols-rounded text-6xl mb-4">mail</span>
                    <p id="emptyText">لا توجد رسائل بعد...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Carousel -->
    <div id="msgModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass w-full max-w-2xl rounded-3xl overflow-hidden relative z-10 animate-fadeIn">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/40">
                <div class="flex gap-2">
                    <button onclick="prevMsg()" class="p-2 hover:bg-slate-700 rounded-full"><span class="material-symbols-rounded">chevron_right</span></button>
                    <button onclick="nextMsg()" class="p-2 hover:bg-slate-700 rounded-full"><span class="material-symbols-rounded">chevron_left</span></button>
                </div>
                <button onclick="closeModal()" class="size-10 flex items-center justify-center hover:bg-rose-500/20 text-rose-500 rounded-full transition"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div id="carouselTrack" class="p-6 max-h-[70vh] overflow-y-auto">
                <!-- Message content loads here -->
            </div>
        </div>
    </header>

    <footer class="text-center p-8 text-slate-500 text-sm">
        <p>⚡ المدعوم بواسطة Mail.tm</p>
        <p class="font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent mt-1">تم التطوير Abdala hanouna لعام 2026</p>
    </footer>

    <script>
        let messages = [];
        let currentIdx = 0;
        let token = '';
        let address = '';
        let lang = 'ar';
        const api = 'https://api.mail.tm';

        const dict = {
            ar: { title: "بريدك المؤقت جاهز", sub: "استخدمه للتسجيل وتفعيل الحسابات بأمان", copy: "نسخ", copied: "تم النسخ!", inbox: "صندوق الوارد", empty: "لا توجد رسائل بعد...", refresh: "تحديث يدوي", change: "تغيير العنوان", timer: "يتم التحديث كل 5 ثوانٍ" },
            en: { title: "Your Temp Mail is Ready", sub: "Use it to register and verify accounts safely", copy: "Copy", copied: "Copied!", inbox: "Inbox", empty: "No messages yet...", refresh: "Manual Refresh", change: "Change Address", timer: "Refreshing every 5 seconds" }
        };

        async function createNewEmail() {
            const domainRes = await fetch(`${api}/domains`);
            const domains = await domainRes.json();
            const domain = domains['hydra:member'][0].domain;
            const user = `user_${Math.random().toString(36).substring(7)}`;
            const pass = 'password123';
            address = `${user}@${domain}`;

            await fetch(`${api}/accounts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, password: pass })
            });

            const tokenRes = await fetch(`${api}/token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address, password: pass })
            });
            const tokenData = await tokenRes.json();
            token = tokenData.token;
            
            document.getElementById('emailInput').value = address;
            fetchMessages();
        }

        async function fetchMessages() {
            if(!token) return;
            const res = await fetch(`${api}/messages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            messages = data['hydra:member'];
            updateUI();
        }

        function updateUI() {
            const container = document.getElementById('inboxContainer');
            const empty = document.getElementById('emptyState');
            document.getElementById('msgCount').innerText = messages.length;

            if (messages.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            container.innerHTML = messages.map((m, i) => `
                <div onclick="openMsg(${i})" class="p-4 hover:bg-indigo-500/10 cursor-pointer flex justify-between items-center transition">
                    <div class="min-w-0 flex-grow">
                        <div class="font-bold text-indigo-400 truncate">${m.from.address}</div>
                        <div class="text-sm truncate font-medium">${m.subject}</div>
                    </div>
                    <span class="material-symbols-rounded text-slate-600">chevron_left</span>
                </div>
            `).join('');
        }

        async function openMsg(i) {
            currentIdx = i;
            const msg = messages[i];
            const res = await fetch(`${api}/messages/${msg.id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            
            document.getElementById('carouselTrack').innerHTML = `
                <div class="animate-fadeIn">
                    <div class="mb-4">
                        <div class="text-xs text-slate-500 mb-1">المُرسل:</div>
                        <div class="font-bold">${data.from.address}</div>
                    </div>
                    <div class="mb-6">
                        <div class="text-xs text-slate-500 mb-1">الموضوع:</div>
                        <div class="text-xl font-black">${data.subject}</div>
                    </div>
                    <div class="prose prose-invert max-w-none bg-slate-900/50 p-4 rounded-2xl border border-slate-700 overflow-x-auto text-sm">
                        ${data.html || data.text}
                    </div>
                </div>
            `;
            document.getElementById('msgModal').classList.remove('hidden');
        }

        function nextMsg() { if(currentIdx > 0) openMsg(currentIdx - 1); }
        function prevMsg() { if(currentIdx < messages.length - 1) openMsg(currentIdx + 1); }
        function closeModal() { document.getElementById('msgModal').classList.add('hidden'); }

        function copyEmail() {
            const el = document.getElementById('emailInput');
            navigator.clipboard.writeText(el.value);
            const btn = document.getElementById('copyBtnText');
            const original = btn.innerText;
            btn.innerText = dict[lang].copied;
            setTimeout(() => btn.innerText = original, 2000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            document.getElementById('themeIcon').innerText = isLight ? 'dark_mode' : 'light_mode';
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = lang === 'ar' ? 'EN' : 'AR';
            const t = dict[lang];
            document.getElementById('title').innerText = t.title;
            document.getElementById('subtitle').innerText = t.sub;
            document.getElementById('copyBtnText').innerText = t.copy;
            document.getElementById('inboxTitle').innerText = t.inbox;
            document.getElementById('emptyText').innerText = t.empty;
            document.getElementById('refreshText').innerText = t.refresh;
            document.getElementById('changeText').innerText = t.change;
            document.getElementById('timerText').innerText = t.timer;
        }

        // Initialize
        createNewEmail();
        setInterval(fetchMessages, 5000);
    </script>
</body>
</html>
