    <script>
        let messages = [];
        let fetchedMessagesContent = {}; // لحفظ محتوى الرسائل لتجنب إعادة تحميلها
        let displayedMsgIds = []; // تمنع إعادة رسم الشاشة إذا لم تصل رسائل جديدة
        let token = '';
        let address = '';
        let lang = 'ar';
        let lastMsgId = null;
        const api = 'https://api.mail.tm';

        const dict = {
            ar: { main: "بريدك المؤقت جاهز", sub: "احصل على رسائل التفعيل فوراً وبشكل مجهول تماماً.", copy: "نسخ", refresh: "تحديث يدوي", change: "تغيير العنوان", inbox: "صندوق الوارد", empty: "بانتظار وصول رسائل...", notify: "وصلت رسالة جديدة من: ", error: "حدث خطأ أثناء تحميل الرسالة.", loading: "جاري تحميل الرسالة..." },
            en: { main: "Your Temp Mail is Ready", sub: "Get your activation emails instantly and completely anonymously.", copy: "Copy", refresh: "Manual Refresh", change: "Change Address", inbox: "Inbox", empty: "Waiting for messages...", notify: "New email received from: ", error: "Error loading message.", loading: "Loading message..." }
        };

        const pages = {
            about: `<h2>حول Vemail</h2><p>نحن نقدم خدمة بريد إلكتروني مجانية ومؤقتة تمنع البريد العشوائي. مع Vemail، يمكنك التسجيل في أي موقع دون الخوف على بريدك الشخصي من الاختراق أو الإزعاج.</p>`,
            privacy: `<h2>سياسة الخصوصية</h2><p>نحن لا نراقب رسائلك ولا نخزنها. بمجرد تغيير بريدك أو إغلاق الصفحة بوقت طويل، يتم مسح كافة البيانات من الخادم التابع لخدمة Mail.tm.</p>`,
            terms: `<h2>شروط الخدمة</h2><p>استخدم هذا البريد للتسجيلات المؤقتة فقط. لا ننصح باستخدامه لحساباتك البنكية أو الحساسة، لأن البريد مؤقت وقد تفقد الوصول إليه مستقبلاً.</p>`
        };

        async function initApp() {
            const savedAddress = localStorage.getItem('vemail_address');
            const savedToken = localStorage.getItem('vemail_token');
            
            if (savedAddress && savedToken) {
                // استرجاع البريد المحفوظ
                address = savedAddress;
                token = savedToken;
                document.getElementById('emailInput').value = address;
                await fetchMessages();
            } else {
                // إنشاء بريد جديد إذا لم يوجد
                await createNewEmail();
            }
            
            // طلب إذن الإشعارات
            if (Notification.permission !== "denied") Notification.requestPermission();
            
            // تحديث تلقائي كل 5 ثواني
            setInterval(fetchMessages, 5000);
        }

        async function createNewEmail() {
            try {
                const domainRes = await fetch(`${api}/domains`);
                const domains = await domainRes.json();
                const domain = domains['hydra:member'][0].domain;
                const user = `vemail_${Math.random().toString(36).substring(7)}`;
                const pass = 'vePass123';
                address = `${user}@${domain}`;

                await fetch(`${api}/accounts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password: pass })
                });

                const tokenRes = await fetch(`${api}/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, password: pass })
                });
                const tokenData = await tokenRes.json();
                token = tokenData.token;
                
                // حفظ البيانات في المتصفح
                localStorage.setItem('vemail_address', address);
                localStorage.setItem('vemail_token', token);
                
                document.getElementById('emailInput').value = address;
                
                resetData();
                await fetchMessages();
            } catch (e) { console.error("Error creating email:", e); }
        }

        function changeEmail() {
            localStorage.removeItem('vemail_address');
            localStorage.removeItem('vemail_token');
            document.getElementById('emailInput').value = "جاري التغيير...";
            createNewEmail();
        }

        function resetData() {
            messages = [];
            lastMsgId = null;
            displayedMsgIds = [];
            fetchedMessagesContent = {};
            document.getElementById('inboxContainer').innerHTML = '';
            document.getElementById('msgCount').innerText = '0';
            document.getElementById('emptyState').style.display = 'block';
        }

        async function manualRefresh() {
            await fetchMessages();
        }

        async function fetchMessages() {
            if(!token) return;
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(`${api}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                // إذا انتهت صلاحية الجلسة أو البريد غير موجود
                if (res.status === 401 || res.status === 403) {
                    changeEmail();
                    return;
                }
                
                if (!res.ok) throw new Error('Network error');
                
                const data = await res.json();
                messages = data['hydra:member'] || [];
                
                // التحقق من وصول رسالة جديدة للإشعار
                if (messages.length > 0) {
                    if (messages[0].id !== lastMsgId) {
                        if (lastMsgId !== null) {
                            sendNotification(messages[0].from.address);
                        }
                        lastMsgId = messages[0].id;
                    }
                }

                // نتحقق إذا تغير عدد أو معرّفات الرسائل لنقوم بإعادة رسم الصندوق
                // هذا يمنع إغلاق الرسائل المفتوحة كل 5 ثواني
                const currentMsgIds = messages.map(m => m.id).join(',');
                if (currentMsgIds !== displayedMsgIds.join(',')) {
                    displayedMsgIds = messages.map(m => m.id);
                    updateUI();
                }

            } catch (e) { console.error("Error fetching messages:", e); }
            document.getElementById('loading').classList.add('hidden');
        }

        function updateUI() {
            const container = document.getElementById('inboxContainer');
            const empty = document.getElementById('emptyState');
            
            if (!container || !empty) return;

            document.getElementById('msgCount').innerText = messages.length;

            if (messages.length === 0) {
                empty.style.display = 'block';
                container.innerHTML = '';
                return;
            }
            
            empty.style.display = 'none';
            
            // رسم جميع الرسائل بطريقة المنسدلة (Accordion)
            container.innerHTML = messages.map((m, i) => `
                <div class="msg-item group bg-slate-900/40">
                    <div onclick="toggleMsg(${i}, '${m.id}')" class="p-5 hover:bg-indigo-500/10 cursor-pointer flex justify-between items-center transition">
                        <div class="min-w-0 flex-grow pr-2">
                            <div class="font-black text-indigo-500 text-[11px] uppercase mb-1 tracking-wider" dir="ltr" style="text-align: ${lang==='ar'?'right':'left'};">${m.from.address}</div>
                            <div class="text-sm font-bold truncate group-hover:text-indigo-400 transition text-slate-200">${m.subject || '(بدون عنوان)'}</div>
                        </div>
                        <span id="icon-${i}" class="material-symbols-rounded text-slate-500 transition-transform duration-300">expand_more</span>
                    </div>
                    
                    <div id="bodyContainer-${i}" class="hidden p-4 bg-slate-950/30 border-t border-slate-800/30 shadow-inner">
                        <div id="loading-${i}" class="text-center text-xs text-indigo-400 font-bold py-6 hidden animate-pulse">${dict[lang].loading}</div>
                        <iframe id="iframe-${i}" class="hidden w-full bg-white rounded-xl shadow-lg border border-slate-200/10"></iframe>
                    </div>
                </div>
            `).join('');
        }

        async function toggleMsg(index, msgId) {
            const bodyContainer = document.getElementById(`bodyContainer-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const iframe = document.getElementById(`iframe-${index}`);
            const loader = document.getElementById(`loading-${index}`);

            // إذا كانت الرسالة مغلقة (مخفية)، نقوم بفتحها
            if (bodyContainer.classList.contains('hidden')) {
                bodyContainer.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';

                // إذا لم يتم تحميل محتوى هذه الرسالة من قبل
                if (!fetchedMessagesContent[msgId]) {
                    loader.classList.remove('hidden');
                    iframe.classList.add('hidden');
                    
                    try {
                        const res = await fetch(`${api}/messages/${msgId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        const data = await res.json();
                        fetchedMessagesContent[msgId] = data; // حفظ المحتوى لتجنب إعادة التحميل
                        renderIframeContent(iframe, data);
                    } catch(e) {
                        iframe.srcdoc = `<html><body><div style="padding:20px; text-align:center; color:red; font-family:sans-serif;">${dict[lang].error}</div></body></html>`;
                    }
                    
                    loader.classList.add('hidden');
                    iframe.classList.remove('hidden');
                } else {
                    // المحتوى محمل مسبقا
                    renderIframeContent(iframe, fetchedMessagesContent[msgId]);
                    iframe.classList.remove('hidden');
                }
            } else {
                // إذا كانت مفتوحة، نقوم بإغلاقها
                bodyContainer.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function renderIframeContent(iframe, data) {
            let content = '';
            if (data.html) {
                content = Array.isArray(data.html) ? data.html.join('') : data.html;
            } else if (data.text) {
                content = `<div style="padding:40px; font-family:sans-serif; line-height:1.6; white-space:pre-wrap;">${data.text}</div>`;
            } else {
                content = `<div style="padding:40px; text-align:center; font-family:sans-serif;">رسالة فارغة.</div>`;
            }
            
            // تأكد من ضبط عرض الآي فريم بشكل يمنع ظهوره صغيراً جداً
            iframe.srcdoc = `<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{margin:0; padding:15px; font-family:sans-serif; color:#222; background:#fff; overflow-x:hidden;}</style></head><body>${content}</body></html>`;
        }

        function sendNotification(sender) {
            if (Notification.permission === "granted") {
                new Notification("Vemail", { body: dict[lang].notify + sender, icon: 'https://cdn-icons-png.flaticon.com/512/281/281769.png' });
            }
        }

        function showPage(p) { document.getElementById('pageContent').innerHTML = pages[p]; document.getElementById('pageModal').classList.remove('hidden'); }
        function hidePage() { document.getElementById('pageModal').classList.add('hidden'); }

        function copyEmail() {
            const el = document.getElementById('emailInput');
            navigator.clipboard.writeText(el.value);
            const original = document.getElementById('t-copy').innerText;
            document.getElementById('t-copy').innerText = "تم النسخ!";
            setTimeout(() => document.getElementById('t-copy').innerText = original, 2000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            document.body.classList.toggle('dark');
            const isLight = document.body.classList.contains('light');
            document.getElementById('themeIcon').innerText = isLight ? 'dark_mode' : 'light_mode';
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = lang === 'ar' ? 'EN' : 'AR';
            const t = dict[lang];
            document.getElementById('t-main').innerText = t.main;
            document.getElementById('t-sub').innerText = t.sub;
            document.getElementById('t-copy').innerText = t.copy;
            document.getElementById('t-refresh').innerText = t.refresh;
            document.getElementById('t-change').innerText = t.change;
            document.getElementById('t-inbox').innerText = t.inbox;
            document.getElementById('t-empty').innerText = t.empty;
            
            // تحديث رسالة التحميل والخطأ في حال كانت هناك رسائل مفتوحة
            updateUI();
        }

        // بدء تشغيل التطبيق عند تحميل الصفحة
        window.onload = initApp;
    </script>
